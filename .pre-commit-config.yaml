# Generated / amalgamated artifacts are never hand-formatted:
#   include/simdrng/version.hpp  - generated from version.hpp.in
#   single-header/*.hpp          - amalgamated outputs (when present locally)
exclude: '\.svg$|\.drawio$|^include/simdrng/version\.hpp$|^single-header/'

repos:
  # --- C / C++: staged hunks only via git-clang-format ---
  # Uses a wrapper script to work around git-clang-format's fixed temp-index
  # path (.git/clang-format-index) which causes stale .lock files when the
  # pre-commit framework's concurrent git operations race with it.
  - repo: local
    hooks:
      - id: clang-format-staged
        name: clang-format (staged hunks)
        entry: python tools/clang-format-staged.py
        language: python
        additional_dependencies: [clang-format==19.*]
        pass_filenames: true
        require_serial: true
        types_or: [c++, c]
        files: \.(c|cc|cpp|h|hpp)$
      - id: gersemi-staged
        name: gersemi (staged hunks)
        entry: python tools/gersemi-staged.py
        language: python
        additional_dependencies: [gersemi==0.17.1]
        pass_filenames: true
        require_serial: true
        # *.cmake.in templates (e.g. simdrngConfig.cmake.in with @PACKAGE_INIT@)
        # are not parseable CMake, so gersemi only formats CMakeLists.txt + *.cmake.
        files: '(^|/)(CMakeLists\.txt|[^/]+\.cmake)$'

  # --- Python ---
  - repo: https://github.com/akaihola/darker
    rev: v3.0.0
    hooks:
      - id: darker
        args: [--formatter=ruff]
        additional_dependencies: [ruff==0.15.9]

  # --- Shell ---
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt

  # --- Markdown ---
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.json"]

  # --- Standard file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-illegal-windows-names
      - id: mixed-line-ending

  # --- Python package validation ---
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        additional_dependencies: ["validate-pyproject-schema-store[all]"]
        files: ^python/pyproject\.toml$
