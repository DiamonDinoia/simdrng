name: Julia

# Julia binding: builds libsimdrng_c, dlopen()s it, and runs runtests.jl via the
# julia_simdrng CTest target. The matrix builds + runs the suite from source on
# every platform the C ABI targets, so a wrapper bug lands on a PR. Blocking
# runtime gate for the Julia binding.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: julia-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  julia:
    name: Julia binding (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   runs-on: ubuntu-24.04,     compiler: gcc }
          - { name: linux-aarch64,  runs-on: ubuntu-24.04-arm, compiler: gcc }
          - { name: macos-arm64,    runs-on: macos-14,         compiler: apple-clang }
          - { name: windows-x64,    runs-on: windows-2022,     compiler: msvc }
    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0  # GenerateVersion.cmake reads git history for the -dev.N suffix

      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-julia-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-julia-${{ matrix.name }}-

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1.8.1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true
          cache-tools: true
          vcvarsall: ${{ runner.os == 'Windows' }}

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'

      - name: Configure + build libsimdrng_c
        run: |
          cmake --preset bindings-julia
          cmake --build build/bindings-julia -j --target simdrng_c

      - name: Run Julia suite (julia_simdrng)
        run: ctest --test-dir build/bindings-julia -R julia_simdrng --output-on-failure
