name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC authentication removes the need for a CODSPEED_TOKEN secret.
# See https://codspeed.io/docs/integrations/ci/github-actions/configuration#oidc-recommended
permissions:
  contents: read
  id-token: write

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
  SCCACHE_GHA_ENABLED: "true"
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache

jobs:
  codspeed:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-codspeed-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-codspeed-

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: aminya/setup-cpp@v1
        with:
          compiler: gcc-14
          cmake: true
          ninja: true

      # The `codspeed` preset enables SIMDRNG_ENABLE_CODSPEED (links codspeed-cpp)
      # and CODSPEED_MODE=instrumentation; pre-rename flags here used to be
      # silently ignored, leaving the harness uninstrumented.
      - name: Configure + build benchmarks (CodSpeed instrumentation)
        run: |
          cmake --preset codspeed
          cmake --build --preset codspeed

      - name: Run with CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: ./build/codspeed/tests/benchmarks
