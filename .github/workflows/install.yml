name: Install & Consume

# Verifies that simdrng is installable and consumable from its install tree:
#   1. configure + build + install simdrng to a prefix (this fetches xsimd/poet);
#   2. install the exact xsimd/poet sources the build used into the same prefix
#      so find_dependency(xsimd)/find_dependency(poet) resolve;
#   3. build .github/consumer (find_package(simdrng) + #include <simdrng/...>).
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  install-consume:
    name: install & consume
    runs-on: ubuntu-24.04
    env:
      PREFIX: ${{ github.workspace }}/_prefix
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # GenerateVersion.cmake reads git history for the -dev.N suffix

      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-install-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-install-

      - name: Install build tooling
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure simdrng
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="$PREFIX"
          -DSIMDRNG_BUILD_TESTS=OFF
          -DSIMDRNG_BUILD_EXAMPLES=OFF

      - name: Build & install simdrng
        run: cmake --build build --target install

      - name: Install matching xsimd & poet into the prefix
        run: bash .github/scripts/install-deps.sh build "$PREFIX"

      - name: Configure, build & run the consumer against the install
        run: |
          cmake -S .github/consumer -B .github/consumer/build -G Ninja \
                -DCMAKE_PREFIX_PATH="$PREFIX"
          cmake --build .github/consumer/build
          ./.github/consumer/build/consume
