name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
  SCCACHE_GHA_ENABLED: "true"
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache

jobs:
  bench:
    name: ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-14, gcc-15, clang-19, clang-20]
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-bench-${{ matrix.compiler }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-bench-

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true

      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev

      # The `bench` preset is Release with an x86-64-v3 (AVX2) baseline.
      - name: Configure
        run: cmake --preset bench

      - name: Build
        run: cmake --build --preset bench

      - name: Run benchmarks
        run: |
          mkdir -p results/${{ matrix.compiler }}
          ./build/bench/tests/benchmarks \
            --benchmark_perf_counters=CYCLES,INSTRUCTIONS,CACHE-MISSES,BRANCH-MISSES,BRANCHES \
            --benchmark_format=json \
            --benchmark_out=results/${{ matrix.compiler }}/bench.json
          lscpu | awk -F: '/Model name/ {sub(/^ +/,"",$2); print $2; exit}' \
            > results/${{ matrix.compiler }}/cpu_model.txt

      - uses: actions/upload-artifact@v7
        with:
          name: bench-${{ matrix.compiler }}
          path: results/${{ matrix.compiler }}/
          retention-days: 30

  publish:
    name: Publish to benchmark-results
    needs: bench
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: bench-downloads

      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }

      - run: pip install -r scripts/requirements.txt

      - name: Stash scripts before orphan checkout
        run: cp -r scripts /tmp/bench-scripts

      - name: Check out orphan branch
        run: |
          git fetch origin benchmark-results:benchmark-results 2>/dev/null || \
            git checkout --orphan benchmark-results
          git checkout benchmark-results 2>/dev/null || git checkout --orphan benchmark-results
          git rm -rf . >/dev/null 2>&1 || true

      - name: Organise results
        run: |
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          for art in bench-downloads/bench-*; do
            compiler="${art##*/bench-}"
            mkdir -p "results/${compiler}"
            cp "${art}/bench.json" "results/${compiler}/${ts}.json"
            if [ -f "${art}/cpu_model.txt" ]; then
              cp "${art}/cpu_model.txt" "results/${compiler}/cpu_model.txt"
            fi
          done

      - name: Regenerate charts
        run: python /tmp/bench-scripts/generate_charts.py results/ --out charts/

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/ charts/
          git commit -m "bench: ${GITHUB_SHA:0:7}" || exit 0
          git push origin benchmark-results
