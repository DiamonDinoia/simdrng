name: pre-commit

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  # Branch push and its PR share one group (see ci.yml) instead of running twice.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # clang-format / gersemi run as repo-local hooks; pre-commit installs the
      # pinned versions into the hook venv. shfmt is fetched by its own hook.
      - uses: pre-commit/action@v3.0.1
