name: Single Header

# Regenerate the amalgamated single header on every push to main and force it
# onto the orphan `single-header` branch:
#   simdrng.hpp - SIMD-capable; poet inlined, xsimd kept external.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

jobs:
  amalgamate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-singleheader-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-singleheader-

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Fetch dependency sources (xsimd, poet)
        # Configure once so CPM fetches xsimd + poet at the pinned versions; the
        # single-header smokes reuse those headers (keeps pins single-sourced).
        run: |
          cmake -S . -B build -G Ninja -DSIMDRNG_BUILD_TESTS=OFF >/dev/null
          echo "XSIMD_INC=$(grep -m1 'xsimd_SOURCE_DIR' build/CMakeCache.txt | cut -d= -f2)/include" >> "$GITHUB_ENV"
          echo "POET_INC=$(grep -m1 'CPM_PACKAGE_poet_SOURCE_DIR' build/CMakeCache.txt | cut -d= -f2)/include" >> "$GITHUB_ENV"

      - name: Generate single header
        run: |
          mkdir -p out
          python3 tools/amalgamate.py --extra-root "$POET_INC" --output out/simdrng.hpp

      - name: Smoke-compile SIMD header (xsimd external, poet inlined)
        # -march=x86-64-v3: AVX2 baseline that GitHub runners can execute; the
        # *Native generators pick the best arch for this -march. (AVX-512 codegen
        # is verified by the library test suite, not here.)
        run: |
          g++ -std=c++20 -O3 -march=x86-64-v3 -I out -I "$XSIMD_INC" \
            .github/single-header/smoke_simd.cpp -o /tmp/sd
          /tmp/sd; echo "single-header xsimd (Native) smoke OK"

      - name: Publish to the single-header branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan single-header
          git rm -rf --cached . >/dev/null 2>&1 || true
          cp out/simdrng.hpp .
          git add -f simdrng.hpp
          git commit -m "Update single-header build from ${GITHUB_SHA}"
          git push -f origin single-header
