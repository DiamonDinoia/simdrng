name: Valgrind memcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  valgrind:
    name: memcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: gcc-14
          cache-key-prefix: cpm-valgrind
          extra-apt-packages: valgrind
      # No -march guard is needed: the valgrind preset disables examples and
      # -march=native, and the AVX-512 dispatch TU is never *executed* on the
      # AVX2 runner (xsimd::dispatch selects the runner's tier at runtime), so
      # Valgrind only ever sees instructions it supports.
      - name: Configure (Valgrind preset)
        run: cmake --preset valgrind
      - name: Build tests
        run: cmake --build --preset valgrind
      - name: memcheck (CTest)
        working-directory: build/valgrind
        run: ctest -T memcheck --output-on-failure -E example_xoshiro_native
