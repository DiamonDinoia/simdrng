name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86: full compiler x SIMD-ISA matrix.
  # AVX-512 runs under Intel SDE since GitHub runners don't guarantee AVX-512.
  # ---------------------------------------------------------------------------
  linux-x86:
    name: linux-x86 / ${{ matrix.compiler }}-${{ matrix.version }} / ${{ matrix.isa }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        version: ["14", "20"]
        isa: [sse4.2, avx2, avx512]
        exclude:
          - { compiler: gcc, version: "20" }
          - { compiler: clang, version: "14" }
        include:
          # Older compilers: single ISA to contain matrix cost.
          - { compiler: gcc, version: "13", isa: avx2 }
          - { compiler: clang, version: "18", isa: avx2 }
    steps:
      - uses: actions/checkout@v6

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cmake: true
          ninja: true

      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev

      - name: Setup Intel SDE (AVX-512 runs)
        if: matrix.isa == 'avx512'
        uses: petarpetrovt/setup-sde@v3
        with:
          environmentVariableName: SDE_PATH

      - name: Compute flags
        id: flags
        run: |
          case "${{ matrix.isa }}" in
            sse4.2) echo "cxx=-msse4.2" >> "$GITHUB_OUTPUT" ;;
            avx2)   echo "cxx=-mavx2 -mfma -mbmi2" >> "$GITHUB_OUTPUT" ;;
            avx512) echo "cxx=-mavx512f -mavx512bw -mavx512dq -mavx512vl -mavx2 -mfma" >> "$GITHUB_OUTPUT" ;;
          esac
          if [ "${{ matrix.isa }}" = "avx512" ]; then
            echo "emulator=${SDE_PATH}/sde64;-future;--" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        run: >
          cmake -S . -B build/release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_TESTS=ON -DENABLE_PYTHON=OFF -DBUILD_EXAMPLES=ON
          -DMARCH_NATIVE=OFF
          -DCMAKE_CXX_FLAGS="${{ steps.flags.outputs.cxx }}"
          -DCMAKE_CROSSCOMPILING_EMULATOR="${{ steps.flags.outputs.emulator }}"

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure

  # ---------------------------------------------------------------------------
  # Linux ARM: native NEON + SVE via qemu-user (same arch, overridden CPU).
  # ---------------------------------------------------------------------------
  linux-arm:
    name: linux-arm / ${{ matrix.compiler }}-${{ matrix.version }} / ${{ matrix.isa }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        version: ["14", "20"]
        isa: [neon, sve]
        exclude:
          - { compiler: gcc, version: "20" }
          - { compiler: clang, version: "14" }
    steps:
      - uses: actions/checkout@v6

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cmake: true
          ninja: true

      - name: Install deps (libpfm4 + qemu for SVE)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpfm4-dev
          if [ "${{ matrix.isa }}" = "sve" ]; then
            sudo apt-get install -y qemu-user-static
          fi

      - name: Compute flags
        id: flags
        run: |
          case "${{ matrix.isa }}" in
            neon) echo "cxx=-march=armv8-a" >> "$GITHUB_OUTPUT" ;;
            sve)  echo "cxx=-march=armv8-a+sve" >> "$GITHUB_OUTPUT" ;;
          esac
          if [ "${{ matrix.isa }}" = "sve" ]; then
            echo "emulator=/usr/bin/qemu-aarch64-static;-cpu;max,sve=on,sve256=on" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        run: >
          cmake -S . -B build/release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_TESTS=ON -DENABLE_PYTHON=OFF -DBUILD_EXAMPLES=ON
          -DMARCH_NATIVE=OFF
          -DCMAKE_CXX_FLAGS="${{ steps.flags.outputs.cxx }}"
          -DCMAKE_CROSSCOMPILING_EMULATOR="${{ steps.flags.outputs.emulator }}"

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure

  # ---------------------------------------------------------------------------
  # macOS (Apple Silicon) and Windows MSVC: single native build each, no SIMD
  # matrix (macos-14 is arm64/NEON; Windows duplicates linux-x86 coverage).
  # ---------------------------------------------------------------------------
  other:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     compiler: apple-clang }
          - { os: windows-2022, compiler: msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true

      - name: Configure
        run: cmake --preset release -DENABLE_PYTHON=OFF

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --preset test --output-on-failure

  # ---------------------------------------------------------------------------
  # Sanitizers, static analysis, coverage: unchanged.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: UBSan + ASan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aminya/setup-cpp@v1
        with: { compiler: clang-20, cmake: true, ninja: true }
      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev
      - name: Configure
        run: >
          cmake -S . -B build/san -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DENABLE_TESTS=ON -DENABLE_PYTHON=OFF
      - run: cmake --build build/san --parallel
      - run: ctest --test-dir build/san --output-on-failure

  analysis:
    name: clang-tidy + cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aminya/setup-cpp@v1
        with:
          compiler: clang-20
          cmake: true
          ninja: true
          clangtidy: true
          cppcheck: true
      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev
      - run: cmake --preset release -DENABLE_PYTHON=OFF
      - name: Run clang-tidy on changed files
        run: |
          files=$(git diff --name-only origin/main...HEAD -- '*.cpp' '*.hpp' || true)
          if [ -n "$files" ]; then
            clang-tidy -p build/release $files
          fi
      - name: cppcheck (headers)
        run: cppcheck --enable=warning,performance,portability --inline-suppr --std=c++20 --quiet include/

  coverage:
    name: Coverage (gcc + lcov)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: aminya/setup-cpp@v1
        with: { compiler: gcc-14, cmake: true, ninja: true }
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev lcov
      - name: Configure
        run: >
          cmake -S . -B build/cov -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="--coverage -O0"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          -DENABLE_TESTS=ON -DENABLE_PYTHON=OFF
      - run: cmake --build build/cov --parallel
      - run: ctest --test-dir build/cov --output-on-failure
      - name: Capture coverage
        run: |
          lcov --directory build/cov --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*_deps/*' '*/tests/*' --output-file coverage.info
      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
