name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86. The library builds SSE2 / AVX2 / AVX-512 variants from a single
  # compile (per-arch TUs in src/, selected at runtime via xsimd::dispatch).
  # So the matrix varies RUNTIME ISA via Intel SDE, not compile flags.
  # ---------------------------------------------------------------------------
  linux-x86:
    name: linux-x86 / ${{ matrix.compiler }}-${{ matrix.version }} / ${{ matrix.isa }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        version: ["14", "20"]
        # native = whatever the runner exposes (AVX2 today). SDE variants emulate
        # specific microarchitectures so xsimd::dispatch selects each SIMD tier.
        isa: [native, sse2, avx2, avx512]
        exclude:
          - { compiler: gcc, version: "20" }
          - { compiler: clang, version: "14" }
        include:
          # Older compilers: single ISA to contain matrix cost.
          - { compiler: gcc, version: "13", isa: native }
          - { compiler: clang, version: "18", isa: native }
    steps:
      - uses: actions/checkout@v6

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cmake: true
          ninja: true

      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev

      - name: Setup Intel SDE (emulated runs)
        if: matrix.isa != 'native'
        uses: petarpetrovt/setup-sde@v3.0
        with:
          environmentVariableName: SDE_PATH

      - name: Compute emulator
        id: flags
        run: |
          case "${{ matrix.isa }}" in
            native) echo "emulator=" >> "$GITHUB_OUTPUT" ;;
            sse2)   echo "emulator=${SDE_PATH}/sde64;-p4p;--"  >> "$GITHUB_OUTPUT" ;;  # Pentium 4 Prescott: SSE3 max
            avx2)   echo "emulator=${SDE_PATH}/sde64;-hsw;--"  >> "$GITHUB_OUTPUT" ;;  # Haswell: AVX2
            avx512) echo "emulator=${SDE_PATH}/sde64;-skx;--"  >> "$GITHUB_OUTPUT" ;;  # Skylake-X: AVX-512 F/CD/BW/DQ/VL
          esac

      - name: Configure
        # MARCH_NATIVE=OFF so binaries don't use instructions unavailable under
        # SDE's emulated CPU (e.g. AVX2 on a -p4p run).
        run: cmake --preset release -DENABLE_PYTHON=OFF -DMARCH_NATIVE=OFF
             -DCMAKE_CROSSCOMPILING_EMULATOR="${{ steps.flags.outputs.emulator }}"

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        # example_xoshiro_native is compiled with -march=native (host CPU),
        # so it uses instructions SDE's emulated older CPU doesn't support.
        # Exclude it on emulated runs.
        run: >
          ctest --test-dir build/release --output-on-failure
          ${{ matrix.isa != 'native' && '-E example_xoshiro_native' || '' }}

  # ---------------------------------------------------------------------------
  # Linux ARM: native NEON. SVE would require a library-side SVE dispatch
  # variant (CMakeLists.txt PRNG_DISPATCH_VARIANTS currently only lists
  # neon64 on aarch64); covered in a follow-up.
  # ---------------------------------------------------------------------------
  linux-arm:
    name: linux-arm / ${{ matrix.compiler }}-${{ matrix.version }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { compiler: gcc,   version: "14" }
          - { compiler: clang, version: "20" }
    steps:
      - uses: actions/checkout@v6

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cmake: true
          ninja: true

      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev

      - name: Configure
        run: cmake --preset release -DENABLE_PYTHON=OFF -DMARCH_NATIVE=OFF

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure

  # ---------------------------------------------------------------------------
  # macOS (Apple Silicon) and Windows MSVC: single native build each, no SIMD
  # matrix (macos-14 is arm64/NEON; Windows duplicates linux-x86 coverage).
  # ---------------------------------------------------------------------------
  other:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     compiler: apple-clang }
          - { os: windows-2022, compiler: msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true

      - name: Configure
        run: cmake --preset release -DENABLE_PYTHON=OFF

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --preset test --output-on-failure

  # ---------------------------------------------------------------------------
  # Sanitizers, static analysis, coverage: unchanged.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: UBSan + ASan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aminya/setup-cpp@v1
        with: { compiler: clang-20, cmake: true, ninja: true }
      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev
      - name: Configure
        run: >
          cmake -S . -B build/san -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DENABLE_TESTS=ON -DENABLE_PYTHON=OFF
      - run: cmake --build build/san --parallel
      - run: ctest --test-dir build/san --output-on-failure

  analysis:
    name: clang-tidy + cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aminya/setup-cpp@v1
        with:
          compiler: clang-20
          cmake: true
          ninja: true
          clangtidy: true
          cppcheck: true
      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev
      - run: cmake --preset release -DENABLE_PYTHON=OFF
      - name: Run clang-tidy on changed files
        run: |
          files=$(git diff --name-only origin/main...HEAD -- '*.cpp' '*.hpp' || true)
          if [ -n "$files" ]; then
            clang-tidy -p build/release $files
          fi
      - name: cppcheck (headers)
        # Explicit file list: cppcheck's default extension set doesn't include .hpp,
        # so passing include/ alone makes it find nothing and exit 1.
        run: |
          find include -type f \( -name '*.hpp' -o -name '*.h' \) -print0 \
            | xargs -0 cppcheck --enable=warning,performance,portability \
                --inline-suppr --language=c++ --std=c++20 --quiet -Iinclude

  coverage:
    name: Coverage (gcc + lcov)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: aminya/setup-cpp@v1
        with: { compiler: gcc-14, cmake: true, ninja: true }
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev lcov
      - name: Configure
        run: >
          cmake -S . -B build/cov -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="--coverage -O0"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          -DENABLE_TESTS=ON -DENABLE_PYTHON=OFF
      - run: cmake --build build/cov --parallel
      - run: ctest --test-dir build/cov --output-on-failure
      - name: Capture coverage
        # aminya/setup-cpp installs gcc-14 but /usr/bin/gcov stays at the
        # stock runner version; lcov's geninfo refuses the mismatch. Point
        # it at the matching gcov-14.
        run: |
          lcov --gcov-tool "$(command -v gcov-14)" --directory build/cov \
               --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*_deps/*' '*/tests/*' --output-file coverage.info
      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
