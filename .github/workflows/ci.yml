name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  # Key on the branch name (head_ref for PRs, ref_name for pushes) so a branch
  # push and its PR share one group instead of running twice.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86. The library builds SSE2 / AVX2 / AVX-512 variants from a single
  # compile (per-arch TUs in src/, selected at runtime via xsimd::dispatch).
  # GitHub x86 runners are AVX2, so `native`/`sse2`/`avx2` all run natively and
  # exercise the AVX2 tier; only `avx512` needs Intel SDE to emulate a CPU the
  # runner can't provide, so dispatch selects the AVX-512 tier.
  # ---------------------------------------------------------------------------
  linux-x86:
    name: linux-x86 / ${{ matrix.compiler }}-${{ matrix.version }} / ${{ matrix.isa }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        version: ["14", "20"]
        isa: [native, sse2, avx2, avx512]
        exclude:
          - { compiler: gcc, version: "20" }
          - { compiler: clang, version: "14" }
        include:
          # Older compilers: single ISA to contain matrix cost.
          - { compiler: gcc, version: "13", isa: native }
          - { compiler: clang, version: "18", isa: native }
    steps:
      - uses: actions/checkout@v6

      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cache-key-prefix: cpm-ci

      # Only avx512 needs emulation (no GitHub runner exposes AVX-512). The SDE
      # download has been seen to return a transient HTTP 202, so retry it.
      - name: Setup Intel SDE (avx512 emulation)
        if: matrix.isa == 'avx512'
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: petarpetrovt/setup-sde@v5.0
          # sdeVersion is required by setup-sde@v5 (its action.yml uses a
          # non-standard `defaultValue:` key that GitHub never injects, so an
          # unset input surfaces as "Please, provide value for option sdeVersion").
          with: |
            environmentVariableName: SDE_PATH
            sdeVersion: 10.8.0
          attempt_limit: 4
          attempt_delay: 15000

      - name: Compute emulator
        id: flags
        run: |
          # native/sse2/avx2 run natively on the AVX2 runner; avx512 emulates
          # Skylake-X (AVX-512 F/CD/BW/DQ/VL) so dispatch selects that tier.
          if [ "${{ matrix.isa }}" = "avx512" ]; then
            echo "emulator=${SDE_PATH}/sde64;-skx;--" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        # The `ci` preset is Release with tests + examples and -march=native OFF,
        # so binaries stay within the configured/emulated ISA.
        run: cmake --preset ci -DCMAKE_CROSSCOMPILING_EMULATOR="${{ steps.flags.outputs.emulator }}"

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        # example_xoshiro_native is compiled -march=native (host CPU), so under
        # SDE's emulated older CPU it would hit unsupported instructions; exclude
        # it only on the emulated avx512 run.
        run: >
          ctest --preset ci
          ${{ matrix.isa == 'avx512' && '-E example_xoshiro_native' || '' }}

  # ---------------------------------------------------------------------------
  # Linux ARM: native NEON. SVE would require a library-side SVE dispatch
  # variant (CMakeLists.txt SIMDRNG_DISPATCH_VARIANTS currently only lists
  # neon64 on aarch64); covered in a follow-up.
  # ---------------------------------------------------------------------------
  linux-arm:
    name: linux-arm / ${{ matrix.compiler }}-${{ matrix.version }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { compiler: gcc,   version: "14" }
          - { compiler: clang, version: "20" }
    steps:
      - uses: actions/checkout@v6

      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cache-key-prefix: cpm-ci-arm

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  # ---------------------------------------------------------------------------
  # macOS (Apple Silicon) and Windows MSVC: single native build each, no SIMD
  # matrix (macos-14 is arm64/NEON; Windows duplicates linux-x86 coverage).
  # ---------------------------------------------------------------------------
  other:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    # macOS builds in a few minutes; the MSVC native build is far slower (~25 min
    # since the Philox SIMD template work, even with INTERLEAVE=1 pinned) and was
    # tipping over a 30-minute cap on runner-variance alone. Give it headroom while
    # still bounding a genuine compile-time pathology (e.g. MSVC choking on
    # deeply-nested template expansion) well short of the 6-hour default timeout.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     compiler: apple-clang }
          - { os: windows-2022, compiler: msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: ${{ matrix.compiler }}
          cache-key-prefix: cpm-ci-${{ matrix.os }}
          # macOS / Windows runners: no perf counters, and apt-get is unavailable.
          libpfm4: "false"

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  # ---------------------------------------------------------------------------
  # Sanitizers (ASan + UBSan): Debug build via the `sanitizers` preset.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: clang-20
          cache-key-prefix: cpm-san
      - run: cmake --preset sanitizers
      - run: cmake --build --preset sanitizers
      - run: ctest --preset sanitizers

  # ---------------------------------------------------------------------------
  # Static analysis: clang-tidy (full sweep) + cppcheck. The `static-analysis`
  # preset exports compile_commands.json for a clang build with tests on.
  # ---------------------------------------------------------------------------
  analysis:
    name: clang-tidy + cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: clang-20
          cache-key-prefix: cpm-analysis
          analysis-tools: "true"
      - name: Configure + build (exports compile_commands.json)
        # Build first so generated headers (version.hpp) exist and the dispatch
        # TUs' compile commands are present for clang-tidy.
        run: |
          cmake --preset static-analysis
          cmake --build --preset static-analysis
      - name: clang-tidy (full sweep)
        # Runs over the dispatch TUs in src/, which have real per-arch compile
        # commands and transitively include every simdrng header; .clang-tidy's
        # HeaderFilterRegex surfaces findings in include/simdrng + src. Informational
        # (no --warnings-as-errors): the hard gate is cppcheck below.
        run: clang-tidy -p build/static-analysis $(git ls-files 'src/*.cpp')
      - name: cppcheck (headers)
        # Explicit file list: cppcheck's default extension set doesn't include
        # .hpp, so passing include/ alone makes it find nothing and exit 1. Fails
        # the job on any finding (the suite is clean / suppressed in-line).
        run: |
          find include -type f \( -name '*.hpp' -o -name '*.h' \) -print0 \
            | xargs -0 cppcheck --enable=warning,performance,portability \
                --inline-suppr --language=c++ --std=c++20 --quiet \
                --error-exitcode=1 -Iinclude

  coverage:
    name: Coverage (gcc + lcov, multi-ISA)
    runs-on: ubuntu-24.04
    # Run on main pushes and on every PR so coverage shows up pre-merge.
    if: >-
      github.event_name == 'pull_request'
      || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Set up build
        uses: ./.github/actions/setup-build
        with:
          compiler: gcc-14
          cache-key-prefix: cpm-cov
          extra-apt-packages: lcov

      # The library compiles a dispatch TU per ISA tier (SSE2 / AVX2 / AVX-512),
      # but the AVX2 runner only ever *executes* the AVX2 tier — the other two
      # (and the headers they expand) stay at 0%, sinking the reported total.
      # Emulate each tier under Intel SDE and merge the per-tier traces so every
      # tier is actually exercised. SDE wraps only the test binaries (via
      # CMAKE_CROSSCOMPILING_EMULATOR), not ctest itself.
      - name: Setup Intel SDE
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: petarpetrovt/setup-sde@v5.0
          with: |
            environmentVariableName: SDE_PATH
            sdeVersion: 10.8.0
          attempt_limit: 4
          attempt_delay: 15000

      - name: Build (coverage preset)
        run: |
          cmake --preset coverage
          cmake --build --preset coverage

      # aminya/setup-cpp installs gcc-14 but /usr/bin/gcov stays at the stock
      # runner version; lcov's geninfo refuses the mismatch, so point it at
      # gcov-14. Each pass resets the .gcda counters, re-points the test
      # emulator (no recompile — it's a ctest-time property), runs, and captures
      # that tier's trace; the native pass needs no emulator. example_xoshiro_native
      # is -march=native (host AVX2) so it can't run under an emulated older CPU.
      - name: Coverage — AVX2 (native)
        run: |
          ctest --preset coverage
          lcov --gcov-tool "$(command -v gcov-14)" --ignore-errors mismatch,source,gcov \
               --directory build/coverage --capture --output-file cov-avx2.info

      - name: Coverage — SSE2 (SDE Prescott)
        run: |
          find build/coverage -name '*.gcda' -delete
          cmake --preset coverage -DCMAKE_CROSSCOMPILING_EMULATOR="${SDE_PATH}/sde64;-p4p;--"
          ctest --preset coverage -E example_xoshiro_native
          lcov --gcov-tool "$(command -v gcov-14)" --ignore-errors mismatch,source,gcov \
               --directory build/coverage --capture --output-file cov-sse2.info

      - name: Coverage — AVX-512 (SDE Skylake-X)
        run: |
          find build/coverage -name '*.gcda' -delete
          cmake --preset coverage -DCMAKE_CROSSCOMPILING_EMULATOR="${SDE_PATH}/sde64;-skx;--"
          ctest --preset coverage -E example_xoshiro_native
          lcov --gcov-tool "$(command -v gcov-14)" --ignore-errors mismatch,source,gcov \
               --directory build/coverage --capture --output-file cov-avx512.info

      - name: Merge tiers + filter
        run: |
          lcov --ignore-errors unused \
               --add-tracefile cov-avx2.info \
               --add-tracefile cov-sse2.info \
               --add-tracefile cov-avx512.info \
               --output-file coverage.info
          lcov --ignore-errors unused --remove coverage.info \
               '/usr/*' '*_deps/*' '*/tests/*' --output-file coverage.info

      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
