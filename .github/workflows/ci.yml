name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Shared across every job: a workspace-local CPM source cache (restored by
# actions/cache) and sccache as the compiler launcher. Both are no-ops when the
# cache misses, so a cold run still works.
env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
  SCCACHE_GHA_ENABLED: "true"
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86. The library builds SSE2 / AVX2 / AVX-512 variants from a single
  # compile (per-arch TUs in src/, selected at runtime via xsimd::dispatch).
  # GitHub x86 runners are AVX2, so `native`/`sse2`/`avx2` all run natively and
  # exercise the AVX2 tier; only `avx512` needs Intel SDE to emulate a CPU the
  # runner can't provide, so dispatch selects the AVX-512 tier.
  # ---------------------------------------------------------------------------
  linux-x86:
    name: linux-x86 / ${{ matrix.compiler }}-${{ matrix.version }} / ${{ matrix.isa }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        version: ["14", "20"]
        isa: [native, sse2, avx2, avx512]
        exclude:
          - { compiler: gcc, version: "20" }
          - { compiler: clang, version: "14" }
        include:
          # Older compilers: single ISA to contain matrix cost.
          - { compiler: gcc, version: "13", isa: native }
          - { compiler: clang, version: "18", isa: native }
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-ci-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-ci-

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cmake: true
          ninja: true

      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev

      # Only avx512 needs emulation (no GitHub runner exposes AVX-512). The SDE
      # download has been seen to return a transient HTTP 202, so retry it.
      - name: Setup Intel SDE (avx512 emulation)
        if: matrix.isa == 'avx512'
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: petarpetrovt/setup-sde@v5.0
          with: |
            environmentVariableName: SDE_PATH
          attempt_limit: 4
          attempt_delay: 15000

      - name: Compute emulator
        id: flags
        run: |
          # native/sse2/avx2 run natively on the AVX2 runner; avx512 emulates
          # Skylake-X (AVX-512 F/CD/BW/DQ/VL) so dispatch selects that tier.
          if [ "${{ matrix.isa }}" = "avx512" ]; then
            echo "emulator=${SDE_PATH}/sde64;-skx;--" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        # The `ci` preset is Release with tests + examples and -march=native OFF,
        # so binaries stay within the configured/emulated ISA.
        run: cmake --preset ci -DCMAKE_CROSSCOMPILING_EMULATOR="${{ steps.flags.outputs.emulator }}"

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        # example_xoshiro_native is compiled -march=native (host CPU), so under
        # SDE's emulated older CPU it would hit unsupported instructions; exclude
        # it only on the emulated avx512 run.
        run: >
          ctest --preset ci
          ${{ matrix.isa == 'avx512' && '-E example_xoshiro_native' || '' }}

  # ---------------------------------------------------------------------------
  # Linux ARM: native NEON. SVE would require a library-side SVE dispatch
  # variant (CMakeLists.txt SIMDRNG_DISPATCH_VARIANTS currently only lists
  # neon64 on aarch64); covered in a follow-up.
  # ---------------------------------------------------------------------------
  linux-arm:
    name: linux-arm / ${{ matrix.compiler }}-${{ matrix.version }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { compiler: gcc,   version: "14" }
          - { compiler: clang, version: "20" }
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-ci-arm-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-ci-arm-

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}-${{ matrix.version }}
          cmake: true
          ninja: true

      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  # ---------------------------------------------------------------------------
  # macOS (Apple Silicon) and Windows MSVC: single native build each, no SIMD
  # matrix (macos-14 is arm64/NEON; Windows duplicates linux-x86 coverage).
  # ---------------------------------------------------------------------------
  other:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     compiler: apple-clang }
          - { os: windows-2022, compiler: msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-ci-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-ci-${{ matrix.os }}-

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  # ---------------------------------------------------------------------------
  # Sanitizers (ASan + UBSan): Debug build via the `sanitizers` preset.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-san-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-san-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: aminya/setup-cpp@v1
        with: { compiler: clang-20, cmake: true, ninja: true }
      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev
      - run: cmake --preset sanitizers
      - run: cmake --build --preset sanitizers
      - run: ctest --preset sanitizers

  # ---------------------------------------------------------------------------
  # Static analysis: clang-tidy (full sweep) + cppcheck. The `static-analysis`
  # preset exports compile_commands.json for a clang build with tests on.
  # ---------------------------------------------------------------------------
  analysis:
    name: clang-tidy + cppcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-analysis-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-analysis-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: aminya/setup-cpp@v1
        with:
          compiler: clang-20
          cmake: true
          ninja: true
          clangtidy: true
          cppcheck: true
      - name: Install libpfm4
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev
      - name: Configure + build (exports compile_commands.json)
        # Build first so generated headers (version.hpp) exist and the dispatch
        # TUs' compile commands are present for clang-tidy.
        run: |
          cmake --preset static-analysis
          cmake --build --preset static-analysis
      - name: clang-tidy (full sweep)
        # Runs over the dispatch TUs in src/, which have real per-arch compile
        # commands and transitively include every simdrng header; .clang-tidy's
        # HeaderFilterRegex surfaces findings in include/simdrng + src. Informational
        # (no --warnings-as-errors): the hard gate is cppcheck below.
        run: clang-tidy -p build/static-analysis $(git ls-files 'src/*.cpp')
      - name: cppcheck (headers)
        # Explicit file list: cppcheck's default extension set doesn't include
        # .hpp, so passing include/ alone makes it find nothing and exit 1. Fails
        # the job on any finding (the suite is clean / suppressed in-line).
        run: |
          find include -type f \( -name '*.hpp' -o -name '*.h' \) -print0 \
            | xargs -0 cppcheck --enable=warning,performance,portability \
                --inline-suppr --language=c++ --std=c++20 --quiet \
                --error-exitcode=1 -Iinclude

  coverage:
    name: Coverage (gcc + lcov)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-cov-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: cpm-cov-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: aminya/setup-cpp@v1
        with: { compiler: gcc-14, cmake: true, ninja: true }
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libpfm4-dev lcov
      - run: cmake --preset coverage
      - run: cmake --build --preset coverage
      - run: ctest --preset coverage
      - name: Capture coverage
        # aminya/setup-cpp installs gcc-14 but /usr/bin/gcov stays at the
        # stock runner version; lcov's geninfo refuses the mismatch. Point
        # it at the matching gcov-14.
        run: |
          lcov --gcov-tool "$(command -v gcov-14)" \
               --ignore-errors mismatch,source,gcov \
               --directory build/coverage --capture --output-file coverage.info
          lcov --ignore-errors unused --remove coverage.info \
               '/usr/*' '*_deps/*' '*/tests/*' --output-file coverage.info
      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
